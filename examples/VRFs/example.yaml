# VRF example: MPLS L3VPN with two customer VRFs (CUSTOMER_A, CUSTOMER_B)
# Topology:
#   CE-A1 (AS 200) ─── PE1 ══ (MPLS core) ══ PE2 ─── CE-A2 (AS 200)
#   CE-B1 (AS 300) ─┘                               └── CE-B2 (AS 300)
#
# PE1 and PE2 are in AS 111 (MPLS).
# CEs are external routers in their own ASes.
# VRF RD/RT are auto-generated by PopulateVrfRdRt if omitted.

111:
  igp: "mpls"
  brand: "cisco"
  loopback_space_v4: "10.0.0.0/24"
  networks_space_v4: "10.1.0.0/16"
  networks: "IPv4"
  routers:
    PE1:
      id: "1.1.1.1"
      loopback_v4: "10.0.0.1"
      # VRFs defined on this PE. RD/RT are omitted → auto-generated as {ceAsn}:{index*100}
      vrfs:
        CUSTOMER_A: {}
        CUSTOMER_B: {}
      interfaces:
        GigabitEthernet1/0:
          neighbour: "PE2"
          addresses:
            - "10.1.0.0/31"
        GigabitEthernet2/0:
          neighbour: "200:CE-A1"
          bgp: "peer"
          vrf: "CUSTOMER_A"
          addresses:
            - "10.1.1.0/31"
        GigabitEthernet3/0:
          neighbour: "300:CE-B1"
          bgp: "peer"
          vrf: "CUSTOMER_B"
          addresses:
            - "10.1.2.0/31"

    PE2:
      id: "2.2.2.2"
      loopback_v4: "10.0.0.2"
      # Explicit RD/RT override example for CUSTOMER_A
      vrfs:
        CUSTOMER_A:
          route_distinguisher: "200:42"
          import_targets:
            - "200:100"
          export_targets:
            - "200:100"
        CUSTOMER_B: {}
      interfaces:
        GigabitEthernet1/0:
          neighbour: "PE1"
          addresses:
            - "10.1.0.1/31"
        GigabitEthernet2/0:
          neighbour: "200:CE-A2"
          bgp: "peer"
          vrf: "CUSTOMER_A"
          addresses:
            - "10.1.3.0/31"
        GigabitEthernet3/0:
          neighbour: "300:CE-B2"
          bgp: "peer"
          vrf: "CUSTOMER_B"
          addresses:
            - "10.1.4.0/31"

200:
  networks: "IPv4"
  brand: "cisco"
  routers:
    CE-A1:
      external: true
      interfaces:
        GigabitEthernet1/0:
          neighbour: "111:PE1"
          bgp: "peer"
          addresses:
            - "10.1.1.1/31"
    CE-A2:
      external: true
      interfaces:
        GigabitEthernet1/0:
          neighbour: "111:PE2"
          bgp: "peer"
          addresses:
            - "10.1.3.1/31"

300:
  networks: "IPv4"
  brand: "cisco"
  routers:
    CE-B1:
      external: true
      interfaces:
        GigabitEthernet1/0:
          neighbour: "111:PE1"
          bgp: "peer"
          addresses:
            - "10.1.2.1/31"
    CE-B2:
      external: true
      interfaces:
        GigabitEthernet1/0:
          neighbour: "111:PE2"
          bgp: "peer"
          addresses:
            - "10.1.4.1/31"